<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Trade Board - API Core</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas for JPG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: white;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #09090b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Interaction states */
        .config-locked { opacity: 0.1; pointer-events: none; height: 0; overflow: hidden; transition: all 0.4s ease; }
        .config-ready { opacity: 1; pointer-events: auto; height: auto; transition: all 0.4s ease; }
        
        #export-board {
            width: 800px;
            min-height: 600px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const API_URL = "https://pokemon-go-api.github.io/pokemon-go-api";
        const SPRITE_SOURCE_URL = "https://raw.githubusercontent.com/RetroJohn86/PoGo-Unpacked-DL-Assets/main/Sprite/pm%20and%20portraits";
        const UNOWN_LIST = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z', 'exclamation', 'question'];

        // --- STABLE SVG ICON COMPONENT ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" fill="currentColor"/>,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
                shirt: <path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/>,
                trash: <><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></>,
                package: <><path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05M12 22.08V12"/></>,
                check: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>,
                down: <path d="m6 9 6 6 6-6"/>,
                right: <path d="m9 18 6-6-6-6"/>,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} style={{ display: 'inline-block', flexShrink: 0 }}>
                    {icons[name] || icons.star}
                </svg>
            );
        };

        const App = () => {
            const [pokedex, setPokedex] = useState([]);
            const [wantedList, setWantedList] = useState([]);
            const [offeredList, setOfferedList] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            // Interface State
            const [activeList, setActiveList] = useState('wanted');
            const [searchTerm, setSearchTerm] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [selectedPoke, setSelectedPoke] = useState(null);

            // Variable Settings
            const [isShiny, setIsShiny] = useState(false);
            const [isLucky, setIsLucky] = useState(false);
            const [selectedCostume, setSelectedCostume] = useState(null);
            const [selectedBg, setSelectedBg] = useState(null);
            const [formState, setFormState] = useState('normal');
            const [manualBg, setManualBg] = useState('');
            const [unownLetter, setUnownLetter] = useState('a');

            // Dropdown State
            const [openDropdown, setOpenDropdown] = useState(null);

            const exportRef = useRef(null);

            // --- RESOLVER: USE RETROJOHN REPO FOR SPRITES ---
            const getImageUrl = (path) => {
                if (!path) return null;
                if (path.startsWith('http')) return path;
                // Correctly resolve API relative paths to the provided GitHub source
                const filename = path.split('/').pop();
                return `${SPRITE_SOURCE_URL}/${filename}`;
            };

            // Initial API Fetch
            useEffect(() => {
                const load = async () => {
                    setIsLoading(true);
                    try {
                        const res = await fetch(`${API_URL}/api/pokedex.json`);
                        const data = await res.json();
                        setPokedex(data);
                    } catch (e) { console.error("API Fetch Error", e); }
                    finally { setIsLoading(false); }
                };
                load();
            }, []);

            // Search Filter
            useEffect(() => {
                if (searchTerm.length < 2 || (selectedPoke && searchTerm === selectedPoke.names.English)) {
                    setSuggestions([]);
                    return;
                }
                const term = searchTerm.toLowerCase();
                const filtered = pokedex
                    .filter(p => p.names?.English?.toLowerCase().includes(term))
                    .sort((a, b) => a.names.English.toLowerCase().startsWith(term) ? -1 : 1)
                    .slice(0, 10);
                setSuggestions(filtered);
            }, [searchTerm, pokedex, selectedPoke]);

            // Modular Asset Mapping
            const assetInfo = useMemo(() => {
                if (!selectedPoke || !selectedPoke.assetForms) return { costumes: [], backgrounds: [] };
                const speciesName = String(selectedPoke.names?.English || "").toUpperCase();
                
                const mapped = selectedPoke.assetForms.map((af, idx) => {
                    const formStr = af.form || "";
                    let displayName = formStr.replace(speciesName, "").replace(/_/g, " ").trim();
                    if (!displayName) displayName = "Standard";
                    return {
                        ...af,
                        id: idx,
                        displayName,
                        resolvedImage: getImageUrl(af.image),
                        resolvedShiny: getImageUrl(af.shinyImage)
                    };
                });

                return {
                    costumes: mapped.filter(a => a.costume),
                    backgrounds: mapped.filter(a => {
                        const f = a.form || "";
                        return f.includes("LOCATION") || f.includes("SPECIAL");
                    })
                };
            }, [selectedPoke]);

            const selectSpecies = (p) => {
                setSelectedPoke(p);
                setSearchTerm(p.names.English);
                setSuggestions([]);
                // Reset all parameters immediately
                setIsShiny(false);
                setIsLucky(false);
                setSelectedCostume(null);
                setSelectedBg(null);
                setFormState('normal');
                setManualBg('');
                setOpenDropdown(null);
            };

            const addEntry = () => {
                if (!selectedPoke) return;

                const name = String(selectedPoke.names.English);
                const paddedDex = String(selectedPoke.dex).padStart(3, '0');

                // Sprite Resolution Logic
                // 1. Current Costume Selection
                // 2. Current Background Selection
                // 3. Species Base (resolved to RetroJohn source)
                let mainUrl = isShiny ? getImageUrl(selectedPoke.shinyImage) : getImageUrl(selectedPoke.image);
                
                if (selectedCostume) {
                    mainUrl = isShiny ? (selectedCostume.resolvedShiny || selectedCostume.resolvedImage) : selectedCostume.resolvedImage;
                } else if (selectedBg) {
                    mainUrl = isShiny ? (selectedBg.resolvedShiny || selectedBg.resolvedImage) : selectedBg.resolvedImage;
                }

                // GitHub Sprite Archive Fallback (the "icon_XXX_XX" style)
                let formId = "00";
                if (name.includes("Origin")) formId = "61";
                else if (name.includes("Alolan")) formId = "12";
                else if (name.includes("Galarian")) formId = "31";
                else if (name.includes("Hisuian")) formId = "51";
                const githubFallback = `https://raw.githubusercontent.com/RetroJohn86/Pokemon-Go-Assets-Archive-Sprites/main/Sprites/pokemon_icon_${paddedDex}_${formId}${isShiny ? '_shiny' : ''}.png`;

                if (!mainUrl) mainUrl = githubFallback;

                const entry = {
                    id: Date.now(),
                    name: name + (name.includes("Unown") ? ` (${unownLetter.toUpperCase()})` : ""),
                    img: mainUrl,
                    github: githubFallback,
                    home: `https://img.pokemondb.net/sprites/home/${isShiny ? 'shiny' : 'normal'}/${name.toLowerCase().replace(/ /g, "-")}.png`,
                    isShiny, isLucky, formState,
                    costume: selectedCostume ? String(selectedCostume.displayName) : "",
                    background: selectedBg ? String(selectedBg.displayName) : String(manualBg)
                };

                if (activeList === 'wanted') setWantedList(p => [...p, entry]);
                else setOfferedList(p => [...p, entry]);

                // Reset
                setSearchTerm(''); setSelectedPoke(null);
            };

            const PokemonCard = ({ item, list }) => {
                const handleErr = (e) => {
                    if (e.target.src === item.img) e.target.src = item.github;
                    else if (e.target.src === item.github) e.target.src = item.home;
                    else e.target.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png";
                };

                return (
                    <div className={`relative group flex flex-col items-center p-3 border-2 transition-all hover:border-white min-h-[180px] overflow-hidden ${item.isLucky ? 'bg-orange-500/10 border-orange-500/50 shadow-[inset_0_0_15px_rgba(249,115,22,0.15)]' : 'bg-zinc-800 border-zinc-700'}`}>
                        <div className="absolute top-1.5 right-1.5 flex flex-col gap-1 z-20">
                            {item.isShiny && <Icon name="sparkles" className="w-5 h-5 text-yellow-400 drop-shadow-md" />}
                            {item.isLucky && <Icon name="zap" className="w-5 h-5 text-orange-400 drop-shadow-md" />}
                        </div>
                        <div className="absolute top-1.5 left-1.5 flex flex-col gap-1 z-20">
                            {item.background && <Icon name="image" className="w-4 h-4 text-emerald-400 drop-shadow-md" />}
                            {item.costume && <Icon name="shirt" className="w-4 h-4 text-blue-400 drop-shadow-md" />}
                        </div>
                        <img src={item.img} crossOrigin="anonymous" className="w-24 h-24 object-contain mt-2 drop-shadow-2xl z-10" onError={handleErr} />
                        <p className="text-[10px] font-black text-center uppercase tracking-tighter mt-auto z-10 leading-none px-1 text-zinc-300 group-hover:text-white transition-colors">{String(item.name)}</p>
                        <div className="flex flex-col gap-0.5 w-full mt-1.5 z-10">
                            {item.formState !== 'normal' && <div className="bg-indigo-600 text-[8px] font-black py-0.5 text-center uppercase">{String(item.formState)}</div>}
                            {item.costume && <div className="bg-blue-600 text-[8px] font-black py-0.5 text-center uppercase">{String(item.costume)}</div>}
                            {item.background && <div className="bg-emerald-600 text-[8px] font-black py-0.5 text-center uppercase">{String(item.background)}</div>}
                        </div>
                    </div>
                );
            };

            const handleExport = async () => {
                if (!window.html2canvas || !exportRef.current) return;
                const canvas = await window.html2canvas(exportRef.current, { useCORS: true, scale: 2, backgroundColor: '#09090b' });
                const link = document.createElement('a');
                link.download = `trade-board-${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            };

            return (
                <div className="min-h-screen text-zinc-100 pb-12 selection:bg-blue-500">
                    <div className="bg-zinc-900 border-b-4 border-blue-500 px-6 py-4 sticky top-0 z-[400] flex items-center justify-between shadow-2xl">
                        <div className="flex items-center gap-2"><Icon name="star" className="w-6 h-6 text-blue-500" /><h1 className="text-2xl font-black tracking-tighter uppercase italic">Go Trade Board</h1></div>
                        <button onClick={handleExport} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-6 py-2 text-sm font-black uppercase shadow-lg active:translate-y-0.5 transition-all"><Icon name="download" className="w-4 h-4" /> <span>Save Board</span></button>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Editor Config */}
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-zinc-900 p-6 border-l-4 border-blue-500 shadow-2xl flex flex-col gap-6">
                                
                                {/* Target List Toggle */}
                                <div className="space-y-2 relative z-[300]">
                                    <div className="grid grid-cols-2 gap-2 p-1 bg-zinc-950 border border-zinc-800">
                                        <button onClick={() => setActiveList('wanted')} className={`py-3 text-[10px] font-black transition-all ${activeList === 'wanted' ? 'bg-red-600 text-white' : 'text-zinc-600 hover:text-zinc-300'}`}>WANTED</button>
                                        <button onClick={() => setActiveList('offered')} className={`py-3 text-[10px] font-black transition-all ${activeList === 'offered' ? 'bg-emerald-600 text-white' : 'text-zinc-600 hover:text-zinc-300'}`}>FOR TRADE</button>
                                    </div>
                                </div>

                                {/* Pokémon Selection */}
                                <div className="space-y-2 relative z-[290]">
                                    <div className="relative">
                                        <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                        <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-sm font-bold uppercase transition-all" placeholder="Find Pokémon Species..." />
                                        {selectedPoke && <Icon name="check" className="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-500 w-5 h-5" />}
                                    </div>
                                    {suggestions.length > 0 && (
                                        <div className="absolute z-[400] w-full mt-1 bg-zinc-800 border-2 border-zinc-700 shadow-2xl max-h-60 overflow-y-auto custom-scrollbar animate-in">
                                            {suggestions.map(s => <button key={s.id} onClick={() => selectSpecies(s)} className="w-full text-left px-4 py-3 hover:bg-zinc-700 text-sm border-b border-zinc-700 font-black uppercase flex items-center justify-between group transition-colors"><span className="text-zinc-100">{String(s.names?.English || "Unknown")}</span><Icon name="right" className="w-4 h-4 text-zinc-500 group-hover:text-blue-500" /></button>)}
                                        </div>
                                    )}
                                </div>

                                {/* Configuration Panel - Unlocked upon Selection */}
                                <div className={`flex flex-col gap-5 config-section ${selectedPoke ? 'config-visible' : 'config-hidden'}`}>
                                    <div className="h-px bg-zinc-800 w-full my-2"></div>
                                    
                                    {/* Costumes Dropdown */}
                                    {assetInfo.costumes.length > 0 && (
                                        <div className="relative z-[280]">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1 italic">Event Costume / Variant</label>
                                            <div className="relative">
                                                <Icon name="package" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                                <input readOnly type="text" value={String(selectedCostume ? selectedCostume.displayName : "Select Costume...")} onClick={() => setOpenDropdown(openDropdown === 'costume' ? null : 'costume')} className="w-full pl-10 pr-10 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer transition-colors" />
                                                <Icon name="down" className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500" />
                                            </div>
                                            {openDropdown === 'costume' && (
                                                <div className="absolute z-[400] w-full mt-1 bg-zinc-950 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                    {assetInfo.costumes.map(asset => (
                                                        <button key={asset.id} onClick={() => { setSelectedCostume(asset); setOpenDropdown(null); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] border-b border-zinc-800 font-black uppercase text-zinc-400 hover:text-zinc-100 flex items-center gap-3 transition-colors">
                                                            <img src={asset.resolvedImage} className="w-8 h-8 object-contain" crossOrigin="anonymous" />
                                                            {String(asset.displayName)}
                                                        </button>
                                                    ))}
                                                    <button onClick={() => { setSelectedCostume(null); setOpenDropdown(null); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] font-black uppercase text-zinc-600 italic">No Costume Selection</button>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Background Dropdown */}
                                    <div className="relative z-[270]">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1 italic">Background Card</label>
                                        <div className="relative">
                                            <Icon name="image" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                            <input readOnly type="text" value={String(selectedBg ? selectedBg.displayName : manualBg || "Standard Background")} onClick={() => setOpenDropdown(openDropdown === 'bg' ? null : 'bg')} className="w-full pl-10 pr-10 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer" />
                                            <Icon name="down" className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500" />
                                        </div>
                                        {openDropdown === 'bg' && (
                                            <div className="absolute z-[400] w-full mt-1 bg-zinc-950 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                {assetInfo.backgrounds.map(asset => (
                                                    <button key={asset.id} onClick={() => { setSelectedBg(asset); setManualBg(''); setOpenDropdown(null); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] border-b border-zinc-800 font-black uppercase text-zinc-400 hover:text-zinc-100 flex items-center gap-3">
                                                        <img src={asset.resolvedImage} className="w-8 h-8 object-contain" crossOrigin="anonymous" />
                                                        {String(asset.displayName)}
                                                    </button>
                                                ))}
                                                <button onClick={() => { setSelectedBg(null); setOpenDropdown(null); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] font-black uppercase text-zinc-600 italic">Standard Selection</button>
                                            </div>
                                        )}
                                        <input type="text" value={manualBg} onChange={(e) => { setManualBg(e.target.value); setSelectedBg(null); }} className="w-full px-4 py-2 bg-zinc-950 border border-zinc-800 outline-none focus:border-blue-500 text-[10px] font-bold uppercase mt-1 transition-all" placeholder="Enter manual location note..." />
                                    </div>

                                    {/* Stats & Toggles */}
                                    <div className="grid grid-cols-2 gap-2">
                                        {(selectedPoke?.shinyAvailable || selectedPoke?.shinyImage) && (
                                            <button onClick={() => setIsShiny(!isShiny)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isShiny ? 'bg-yellow-500/10 border-yellow-500 text-yellow-500 shadow-[inset_0_0_10px_rgba(234,179,8,0.2)]' : 'bg-zinc-800 border-zinc-700 text-zinc-600'}`}>
                                                <Icon name="sparkles" /> <span className="text-[10px] font-black uppercase tracking-widest">Shiny</span>
                                            </button>
                                        )}
                                        <button onClick={() => setIsLucky(!isLucky)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isLucky ? 'bg-orange-500/10 border-orange-500 text-orange-500 shadow-[inset_0_0_10px_rgba(249,115,22,0.1)]' : 'bg-zinc-800 border-zinc-700 text-zinc-600'}`}>
                                            <Icon name="zap" /> <span className="text-[10px] font-black uppercase tracking-widest">Lucky</span>
                                        </button>
                                    </div>

                                    {/* Battle Forms */}
                                    {(selectedPoke?.tempEvolutions?.length > 0 || selectedPoke?.dex <= 1000) && (
                                        <select value={formState} onChange={(e) => setFormState(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer" >
                                            <option value="normal">Standard Form</option>
                                            {selectedPoke?.dex <= 1000 && <option value="dynamax">Dynamax</option>}
                                            {selectedPoke?.dex <= 1000 && <option value="gigantamax">Gigantamax</option>}
                                            {selectedPoke?.tempEvolutions?.length > 0 && <option value="mega">Mega Evolution</option>}
                                        </select>
                                    )}

                                    <button onClick={addEntry} className="w-full py-5 font-black bg-white text-black hover:bg-blue-600 hover:text-white transition-all uppercase tracking-widest flex items-center justify-center gap-2 shadow-2xl active:scale-[0.98]">
                                        <Icon name="star" className="w-6 h-6 mb-0.5" /> ADD TO BOARD
                                    </button>
                                </div>
                            </section>
                        </div>

                        {/* Rendering Output */}
                        <div className="lg:col-span-8">
                            <div className="overflow-x-auto pb-8">
                                <div ref={exportRef} id="export-board" className="bg-zinc-950 p-10 border-[20px] border-zinc-900 flex flex-col gap-12 mx-auto shadow-2xl">
                                    <div className="space-y-12">
                                        {/* Wanted List */}
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-4 bg-red-600 px-6 py-3 shadow-xl">
                                                <Icon name="search" className="w-8 h-8 text-white" />
                                                <h3 className="text-3xl font-black text-white uppercase italic tracking-widest">WANTED</h3>
                                            </div>
                                            <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800 min-h-[100px]">
                                                {wantedList.map(item => <PokemonCard key={item.id} item={item} list="wanted" />)}
                                                {wantedList.length === 0 && <div className="col-span-full h-24 flex items-center justify-center text-zinc-700 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900">LIST EMPTY</div>}
                                            </div>
                                        </div>

                                        {/* Offered List */}
                                        <div className="space-y-4 flex-1">
                                            <div className="flex items-center gap-4 bg-emerald-600 px-6 py-3 shadow-xl">
                                                <Icon name="zap" className="w-8 h-8 text-white" />
                                                <h3 className="text-3xl font-black text-white uppercase italic tracking-widest">FOR TRADE</h3>
                                            </div>
                                            <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800 min-h-[100px]">
                                                {offeredList.map(item => <PokemonCard key={item.id} item={item} list="offered" />)}
                                                {offeredList.length === 0 && <div className="col-span-full h-24 flex items-center justify-center text-zinc-800 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900">LIST EMPTY</div>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-between pt-10 border-t-4 border-zinc-900">
                                        <div className="flex gap-2 opacity-10">
                                            {[...Array(6)].map((_, i) => <div key={i} className="w-12 h-1 bg-white"></div>)}
                                        </div>
                                        <p className="text-zinc-800 text-xs font-black uppercase tracking-[0.5em] italic">GO_CORE_API_V45.0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
