<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Trade Board - Standalone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas for JPG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #09090b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Animation utilities */
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONSTANTS ---
        const UNOWN_FORMS = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z', 'exclamation', 'question'];
        
        const BG_IMAGE_MAP = {
            "dialga": "gotour2026diamond",
            "dialga-origin": "gotour2026diamond",
            "palkia": "gotour2026pearl",
            "palkia-origin": "gotour2026pearl",
            "venusaur": "gotour2026mega",
            "charizard": "gotour2026mega",
            "blastoise": "gotour2026mega",
            "pidgeot": "gotour2026mega",
            "victreebel": "gotour2026mega",
            "kangaskhan": "gotour2026mega",
            "scizor": "gotour2026mega",
            "heracross": "gotour2026mega",
            "tyranitar": "gotour2026mega",
            "sceptile": "gotour2026mega",
            "blaziken": "gotour2026mega",
            "swampert": "gotour2026mega",
            "gardevoir": "gotour2026mega",
            "absol": "gotour2026mega",
            "salamence": "gotour2026mega",
            "metagross": "gotour2026mega",
            "latias": "gotour2026mega",
            "latios": "gotour2026mega",
            "garchomp": "gotour2026mega",
            "lucario": "gotour2026mega",
            "gallade": "gotour2026mega",
            "malamar": "gotour2026mega",
            "necrozma": "ultra",
            "solgaleo": "radiance",
            "lunala": "umbra",
            "kyogre": "wildarea",
            "groudon": "roadtokalos",
            "eevee": "seoul"
        };

        // --- COMPONENTS ---

        // Simple Icon Component (since Lucide-React isn't a standard UMD global)
        const Icon = ({ name, className = "w-4 h-4" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [wantedList, setWantedList] = useState([]);
            const [offeredList, setOfferedList] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeSection, setActiveSection] = useState('wanted');
            const [pokedex, setPokedex] = useState([]);
            const [selectedPoke, setSelectedPoke] = useState(null); 

            const [unownLetter, setUnownLetter] = useState('a');
            const [isShiny, setIsShiny] = useState(false);
            const [isLucky, setIsLucky] = useState(false);
            const [formState, setFormState] = useState('normal'); 
            const [costume, setCostume] = useState('');
            const [showCostumeList, setShowCostumeList] = useState(false);
            const [background, setBackground] = useState('');
            const [selectedBgFile, setSelectedBgFile] = useState(null);
            const [showBgList, setShowBgList] = useState(false);

            const exportRef = useRef(null);

            // Hoisted Export Function
            const handleExport = async () => {
                if (!window.html2canvas || !exportRef.current) return;
                try {
                    const canvas = await window.html2canvas(exportRef.current, { 
                        useCORS: true, 
                        scale: 2, 
                        backgroundColor: '#09090b' 
                    });
                    const link = document.createElement('a');
                    link.download = `pogo-trade-board-${Date.now()}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                } catch (err) {
                    console.error("Export failed", err);
                }
            };

            // Fetch API Data
            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    try {
                        const response = await fetch("https://pokemon-go-api.github.io/pokemon-go-api/api/pokedex.json");
                        const data = await response.json();
                        const flattened = [];
                        data.forEach(p => {
                            flattened.push({ ...p, isBase: true, parentShiny: p.shinyAvailable });
                            if (p.forms) {
                                p.forms.forEach(f => {
                                    if (f.names?.English && f.names.English !== p.names.English) {
                                        flattened.push({ ...f, dex: p.dex, id: f.id, isBase: false, parentShiny: p.shinyAvailable, assetForms: p.assetForms });
                                    }
                                });
                            }
                        });
                        setPokedex(flattened);
                    } catch (e) { console.error("API Load Failed", e); }
                    finally { setIsLoading(false); }
                };
                loadData();
            }, []);

            // Search
            useEffect(() => {
                if (searchTerm.length < 2 || (selectedPoke && searchTerm === selectedPoke.names.English)) {
                    setSuggestions([]);
                    return;
                }
                const term = searchTerm.toLowerCase();
                const filtered = pokedex
                    .filter(p => p.names?.English?.toLowerCase().includes(term))
                    .sort((a, b) => a.names.English.toLowerCase().startsWith(term) ? -1 : 1)
                    .slice(0, 15);
                setSuggestions(filtered);
            }, [searchTerm, pokedex, selectedPoke]);

            const getDynamicOptions = () => {
                if (!selectedPoke || !selectedPoke.assetForms) return { costumes: [], backgrounds: [] };
                const costumes = selectedPoke.assetForms
                    .filter(af => af.costume && af.form)
                    .map(af => {
                        const formStr = String(af.form || "");
                        const speciesName = String(selectedPoke.names.English || "").toUpperCase();
                        let clean = formStr.replace(speciesName, "").replace(/_/g, " ").trim();
                        return clean || "Event Costume";
                    });
                const backgrounds = selectedPoke.assetForms
                    .filter(af => af.form && (af.form.includes("LOCATION") || af.form.includes("SPECIAL")))
                    .map(af => String(af.form).replace(/_/g, " "));
                return { costumes: [...new Set(costumes)], backgrounds: [...new Set(backgrounds)] };
            };

            const { costumes: dynCostumes, backgrounds: dynBgs } = getDynamicOptions();

            const selectPokemon = (p) => {
                setSelectedPoke(p);
                setSearchTerm(p.names.English);
                setSuggestions([]);
                setIsShiny(false);
                setFormState('normal');
                setCostume('');
                setBackground('');
                setSelectedBgFile(null);
            };

            const addPokemon = () => {
                if (!selectedPoke) return;
                const baseId = selectedPoke.dex;
                const paddedId = String(baseId).padStart(3, '0');
                let goFormId = "00";
                const name = String(selectedPoke.names.English);
                if (name.includes("Origin")) goFormId = "61";
                else if (name.includes("Alolan")) goFormId = "12";
                else if (name.includes("Galarian")) goFormId = "31";
                else if (name.includes("Hisuian")) goFormId = "51";

                const goAssetUrl = `https://raw.githubusercontent.com/RetroJohn86/Pokemon-Go-Assets-Archive-Sprites/main/Sprites/pokemon_icon_${paddedId}_${goFormId}${isShiny ? '_shiny' : ''}.png`;
                const spriteType = isShiny ? 'shiny' : 'normal';
                let homeName = name.toLowerCase().replace(/ /g, "-").replace(/[()]/g, "");
                if (name.includes("Unown")) homeName = `unown-${unownLetter}`;
                const homeSpriteUrl = `https://img.pokemondb.net/sprites/home/${spriteType}/${homeName}.png`;

                const entry = {
                    id: Date.now(),
                    name: name + (name.includes("Unown") ? ` (${unownLetter.toUpperCase()})` : ""),
                    isShiny, isLucky, formState, costume: String(costume), background: String(background),
                    bgUrl: selectedBgFile ? `https://www.serebii.net/pokemongo/locationcard/th/${selectedBgFile}.jpg` : null,
                    goAssetUrl, homeSpriteUrl
                };

                if (activeSection === 'wanted') setWantedList(prev => [...prev, entry]);
                else setOfferedList(prev => [...prev, entry]);

                setSearchTerm(''); setSelectedPoke(null); setCostume(''); setBackground(''); setFormState('normal'); setIsShiny(false); setIsLucky(false);
            };

            const PokemonCard = ({ item, onRemove }) => (
                <div className={`relative group flex flex-col items-center p-4 border-2 transition-all hover:border-white cursor-pointer min-h-[240px] overflow-hidden ${item.isLucky ? 'bg-orange-500/10 border-orange-500/50 shadow-[0_0_15px_rgba(249,115,22,0.2)]' : 'bg-zinc-800 border-zinc-700'}`} onClick={onRemove}>
                    {item.bgUrl && (
                        <div className="absolute inset-0 z-0">
                            <img src={item.bgUrl} className="w-full h-full object-cover opacity-60 brightness-75 scale-110" alt="" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        </div>
                    )}
                    <div className="absolute top-2 right-2 flex flex-col gap-1.5 z-20">
                        {item.isShiny && <Icon name="sparkles" className="w-5 h-5 text-yellow-400" />}
                        {item.isLucky && <Icon name="zap" className="w-5 h-5 text-orange-400" />}
                        {item.formState === 'mega' && <Icon name="activity" className="w-5 h-5 text-indigo-400" />}
                    </div>
                    <div className="absolute top-2 left-2 flex flex-col gap-1.5 z-20">
                        {item.background && <Icon name="image" className="w-4 h-4 text-emerald-400" />}
                        {item.costume && <Icon name="shirt" className="w-4 h-4 text-blue-400" />}
                    </div>
                    <div className="relative mb-3 z-10">
                        <img src={item.goAssetUrl} alt={String(item.name)} className={`w-24 h-24 md:w-32 md:h-32 object-contain drop-shadow-2xl ${item.formState !== 'normal' ? 'scale-110' : ''}`} onError={(e) => { if (e.target.src !== item.homeSpriteUrl) e.target.src = item.homeSpriteUrl; }} />
                    </div>
                    <p className="text-[13px] font-black text-center w-full text-white uppercase tracking-tighter px-0.5 leading-none mb-2 z-10">{String(item.name)}</p>
                    <div className="flex flex-col gap-1 w-full items-center mt-auto z-10">
                        {item.formState !== 'normal' && <div className={`text-[8px] font-black px-2 py-0.5 w-full text-center uppercase ${item.formState === 'mega' ? 'bg-indigo-600' : 'bg-pink-600'}`}>{String(item.formState)}</div>}
                        {item.costume && <div className="bg-blue-600/90 text-white text-[9px] font-black px-2 py-1.5 w-full text-center uppercase leading-tight border-l-2 border-white/30 whitespace-pre-wrap">{String(item.costume)}</div>}
                        {item.background && <div className="bg-emerald-600/90 text-white text-[9px] font-black px-2 py-1.5 w-full text-center uppercase leading-tight border-l-2 border-white/30 whitespace-pre-wrap">{String(item.background)}</div>}
                    </div>
                    <div className="absolute inset-0 bg-red-600/90 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-30"><Icon name="trash-2" className="text-white w-10 h-10" /></div>
                </div>
            );

            return (
                <div className="min-h-screen text-zinc-100 pb-12">
                    <div className="bg-zinc-900 border-b-4 border-blue-500 px-6 py-4 sticky top-0 z-40 flex items-center justify-between shadow-2xl">
                        <div className="flex items-center gap-2"><Icon name="star" className="w-6 h-6 text-blue-500" /><h1 className="text-2xl font-black tracking-tighter uppercase italic">Go Trade Board</h1></div>
                        <button onClick={handleExport} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-6 py-2 text-sm font-black uppercase shadow-lg active:translate-y-0.5 transition-all"><Icon name="download" className="w-4 h-4" /> <span>Save Board</span></button>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-zinc-900 p-6 border-l-4 border-blue-500 shadow-xl">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-[0.2em] mb-6">Trade Config</h2>
                                <div className="space-y-6">
                                    <div className="relative">
                                        <label className="text-[10px] font-black text-zinc-400 uppercase mb-2 block tracking-widest">1. Search Pokémon</label>
                                        <div className="relative">
                                            {isLoading ? <Icon name="loader-2" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-blue-500 animate-spin" /> : <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />}
                                            <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-sm font-bold uppercase" placeholder="Enter name..." />
                                        </div>
                                        {suggestions.length > 0 && (
                                            <div className="absolute z-50 w-full mt-1 bg-zinc-800 border-2 border-zinc-700 shadow-2xl max-h-80 overflow-y-auto custom-scrollbar">
                                                {suggestions.map(s => <button key={s.id} onClick={() => selectPokemon(s)} className="w-full text-left px-4 py-3 hover:bg-zinc-700 text-sm border-b border-zinc-700 font-black uppercase flex items-center justify-between group transition-colors"><span className="text-zinc-100">{String(s.names.English)}</span><Icon name="chevron-right" className="w-4 h-4 text-zinc-500 group-hover:text-blue-500" /></button>)}
                                            </div>
                                        )}
                                    </div>

                                    {selectedPoke && String(selectedPoke.names.English).includes('Unown') && (
                                        <div className="animate-in">
                                            <label className="text-[10px] font-black text-blue-400 uppercase mb-2 block tracking-widest italic">Pick Letter</label>
                                            <div className="grid grid-cols-7 gap-1 bg-zinc-950 p-2 border border-zinc-800">
                                                {UNOWN_FORMS.map(letter => (
                                                    <button key={letter} onClick={() => setUnownLetter(letter)} className={`py-2 text-[10px] font-black uppercase transition-all border ${unownLetter === letter ? 'bg-blue-600 border-blue-400 text-white' : 'bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-white'}`}>{String(letter === 'exclamation' ? '!' : letter === 'question' ? '?' : letter.toUpperCase())}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setActiveSection('wanted')} className={`py-3 text-xs font-black transition-all border-b-4 ${activeSection === 'wanted' ? 'bg-red-600/20 border-red-600 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-500'}`}>WANT</button>
                                        <button onClick={() => setActiveSection('offered')} className={`py-3 text-xs font-black transition-all border-b-4 ${activeSection === 'offered' ? 'bg-emerald-600/20 border-emerald-600 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-500'}`}>HAVE</button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        {(selectedPoke?.shinyAvailable || selectedPoke?.parentShiny) && (
                                            <button onClick={() => setIsShiny(!isShiny)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isShiny ? 'bg-yellow-500/10 border-yellow-500 text-yellow-500' : 'bg-zinc-800 border-zinc-700 text-zinc-500'}`}><Icon name="sparkles" /><span className="text-[10px] font-black uppercase">Shiny</span></button>
                                        )}
                                        <button onClick={() => setIsLucky(!isLucky)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isLucky ? 'bg-orange-500/10 border-orange-500 text-orange-500' : 'bg-zinc-800 border-zinc-700 text-zinc-500'}`}><Icon name="zap" /><span className="text-[10px] font-black uppercase">Lucky</span></button>
                                    </div>

                                    {((selectedPoke?.tempEvolutions?.length > 0) || (selectedPoke?.dex <= 1000)) && (
                                        <div>
                                            <label className="text-[10px] font-black text-zinc-400 uppercase mb-2 block tracking-widest">Special Form</label>
                                            <select value={formState} onChange={(e) => setFormState(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer" >
                                                <option value="normal">Normal</option>
                                                <option value="dynamax">Dynamax</option>
                                                <option value="gigantamax">Gigantamax</option>
                                                {selectedPoke?.tempEvolutions?.length > 0 && <option value="mega">Mega Evolution</option>}
                                            </select>
                                        </div>
                                    )}

                                    <div className="space-y-3">
                                        <div className="relative">
                                            <label className="text-[10px] font-black text-zinc-400 uppercase mb-1 block tracking-widest">Costume</label>
                                            <div className="relative">
                                                <Icon name="shirt" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                                <input type="text" value={costume} onChange={(e) => setCostume(e.target.value)} className="w-full pl-10 pr-10 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase" placeholder="Enter costume..." />
                                                <button onClick={() => setShowCostumeList(!showCostumeList)} className="absolute right-3 top-1/2 -translate-y-1/2"><Icon name="chevron-down" /></button>
                                            </div>
                                            {showCostumeList && dynCostumes.length > 0 && (
                                                <div className="absolute z-50 w-full mt-1 bg-zinc-800 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                    {dynCostumes.map(c => <button key={String(c)} onClick={() => { setCostume(String(c)); setShowCostumeList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-700 text-[10px] border-b border-zinc-700 font-black uppercase text-zinc-100">{String(c)}</button>)}
                                                </div>
                                            )}
                                        </div>

                                        <div className="relative">
                                            <label className="text-[10px] font-black text-zinc-400 uppercase mb-1 block tracking-widest">Background</label>
                                            <div className="relative">
                                                <Icon name="image" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                                <input type="text" value={background} onChange={(e) => setBackground(e.target.value)} className="w-full pl-10 pr-10 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase" placeholder="Select location..." />
                                                <button onClick={() => setShowBgList(!showBgList)} className="absolute right-3 top-1/2 -translate-y-1/2"><Icon name="chevron-down" /></button>
                                            </div>
                                            {showBgList && (
                                                <div className="absolute z-50 w-full mt-1 bg-zinc-800 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                                    {dynBgs.map(b => <button key={String(b)} onClick={() => { setBackground(String(b)); setSelectedBgFile(BG_IMAGE_MAP[selectedPoke.names.English.toLowerCase().replace(/ /g,"-")] || null); setShowBgList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-700 text-[10px] border-b border-zinc-700 font-black uppercase text-zinc-100">{String(b)}</button>)}
                                                    <button onClick={() => { setBackground(""); setShowBgList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-700 text-[10px] font-black uppercase text-zinc-400 italic">Clear Selection</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <button onClick={addPokemon} disabled={!selectedPoke} className={`w-full py-5 font-black uppercase tracking-[0.2em] transition-all active:scale-95 flex flex-col items-center justify-center gap-0.5 shadow-2xl ${selectedPoke ? 'bg-white text-black hover:bg-blue-500 hover:text-white' : 'bg-zinc-800 text-zinc-700 cursor-not-allowed'}`}><Icon name="plus" className="w-6 h-6" /><span className="text-sm">ADD TO BOARD</span></button>
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-8 overflow-hidden" id="board-section">
                            <div className="overflow-x-auto pb-8">
                                <div ref={exportRef} className="bg-zinc-950 p-10 border-[20px] border-zinc-900 w-[780px] lg:w-full min-h-[1000px] flex flex-col gap-12 mx-auto" style={{ minWidth: '780px' }}>
                                    <div className="flex flex-col items-center"><h2 className="text-7xl font-black text-white tracking-tighter uppercase italic leading-none border-b-[12px] border-blue-600 pb-3 text-center">TRADE LIST</h2></div>
                                    <div className="space-y-5">
                                        <div className="flex items-center gap-4 bg-red-600 px-6 py-3 shadow-xl"><Icon name="search" className="w-8 h-8 text-white" /><h3 className="text-3xl font-black text-white uppercase italic tracking-widest text-center">WANTED</h3></div>
                                        <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800">
                                            {wantedList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => removeItem(item.id, 'wanted')} />)}
                                            {wantedList.length === 0 && <div className="col-span-full h-40 flex items-center justify-center text-zinc-800 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900 bg-zinc-950">EMPTY</div>}
                                        </div>
                                    </div>
                                    <div className="space-y-5 flex-1">
                                        <div className="flex items-center gap-4 bg-emerald-600 px-6 py-3 shadow-xl"><Icon name="zap" className="w-8 h-8 text-white" /><h3 className="text-3xl font-black text-white uppercase italic tracking-widest text-center">FOR TRADE</h3></div>
                                        <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800">
                                            {offeredList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => removeItem(item.id, 'offered')} />)}
                                            {offeredList.length === 0 && <div className="col-span-full h-40 flex items-center justify-center text-zinc-800 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900 bg-zinc-950">EMPTY</div>}
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between pt-10 border-t-4 border-zinc-900">
                                        <div className="flex gap-2">{[...Array(10)].map((_, i) => <div key={i} className={`w-4 h-2 ${i < 5 ? 'bg-blue-600' : 'bg-zinc-800'}`}></div>)}</div>
                                        <p className="text-zinc-700 text-xs font-black uppercase tracking-[0.5em] italic">GEN_DATA_V24.0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
