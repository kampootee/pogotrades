<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Trade Board - Sequential API Fix</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas for JPG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: white;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #09090b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-inactive { opacity: 0.15; pointer-events: none; filter: grayscale(1); transition: all 0.4s ease; }
        .step-active { opacity: 1; pointer-events: auto; filter: grayscale(0); transition: all 0.4s ease; }
        
        #export-board {
            width: 800px;
            min-height: 1000px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const UNOWN_FORMS = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z', 'exclamation', 'question'];
        
        const BG_IMAGE_MAP = {
            "dialga": "gotour2026diamond",
            "palkia": "gotour2026pearl",
            "venusaur": "gotour2026mega",
            "charizard": "gotour2026mega",
            "blastoise": "gotour2026mega",
            "necrozma": "ultra",
            "solgaleo": "radiance",
            "lunala": "umbra",
            "kyogre": "wildarea",
            "groudon": "roadtokalos",
            "eevee": "seoul"
        };

        // --- ROBUST INLINE ICON COMPONENT ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" fill="currentColor"/>,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>,
                image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
                shirt: <path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/>,
                trash: <><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></>,
                package: <><path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05M12 22.08V12"/></>,
                pin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                check: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>,
                right: <path d="m9 18 6-6-6-6"/>,
                down: <path d="m6 9 6 6 6-6"/>,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} style={{ display: 'inline-block', flexShrink: 0 }}>
                    {icons[name] || icons.star}
                </svg>
            );
        };

        const App = () => {
            const [wantedList, setWantedList] = useState([]);
            const [offeredList, setOfferedList] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeSection, setActiveSection] = useState('wanted');
            const [pokedex, setPokedex] = useState([]);
            const [selectedPoke, setSelectedPoke] = useState(null); 

            // Sequential Flow States
            const [unownLetter, setUnownLetter] = useState('a');
            const [selectedCostume, setSelectedCostume] = useState(null);
            const [selectedBgAsset, setSelectedBgAsset] = useState(null);
            const [isShiny, setIsShiny] = useState(false);
            const [isLucky, setIsLucky] = useState(false);
            const [formState, setFormState] = useState('normal'); 
            const [customBackground, setCustomBackground] = useState('');

            // UI States
            const [showCostumeList, setShowCostumeList] = useState(false);
            const [showBgList, setShowBgList] = useState(false);

            const exportRef = useRef(null);

            const handleExport = async () => {
                if (!window.html2canvas || !exportRef.current) return;
                try {
                    const canvas = await window.html2canvas(exportRef.current, { 
                        useCORS: true, 
                        allowTaint: false,
                        scale: 2, 
                        backgroundColor: '#09090b' 
                    });
                    const link = document.createElement('a');
                    link.download = `pogo-trade-board-${Date.now()}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                } catch (err) { console.error("Export failed", err); }
            };

            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    try {
                        const response = await fetch("https://pokemon-go-api.github.io/pokemon-go-api/api/pokedex.json");
                        const data = await response.json();
                        setPokedex(data);
                    } catch (e) { console.error("API Load Failed", e); }
                    finally { setIsLoading(false); }
                };
                loadData();
            }, []);

            useEffect(() => {
                if (searchTerm.length < 2 || (selectedPoke && searchTerm === selectedPoke.names.English)) {
                    setSuggestions([]);
                    return;
                }
                const term = searchTerm.toLowerCase();
                const filtered = pokedex
                    .filter(p => p.names?.English?.toLowerCase().includes(term))
                    .sort((a, b) => a.names.English.toLowerCase().startsWith(term) ? -1 : 1)
                    .slice(0, 10);
                setSuggestions(filtered);
            }, [searchTerm, pokedex, selectedPoke]);

            const assetGroups = useMemo(() => {
                if (!selectedPoke || !selectedPoke.assetForms) return { costumes: [], backgrounds: [] };
                const speciesName = String(selectedPoke.names?.English || "").toUpperCase();
                
                const all = selectedPoke.assetForms.map((af, index) => {
                    const formStr = String(af.form || "");
                    let displayName = "Standard";
                    if (formStr) {
                        displayName = formStr.replace(speciesName, "").replace(/_/g, " ").trim();
                        if (!displayName) displayName = "Standard";
                    }
                    return { ...af, id: index, displayName, formName: formStr };
                });

                return {
                    costumes: all.filter(a => a.costume),
                    backgrounds: all.filter(a => a.formName && (a.formName.includes("LOCATION") || a.formName.includes("SPECIAL")))
                };
            }, [selectedPoke]);

            const selectPokemon = (p) => {
                setSelectedPoke(p);
                setSearchTerm(p.names.English);
                setSuggestions([]);
                // Reset configs
                setIsShiny(false);
                setFormState('normal');
                setSelectedCostume(null);
                setSelectedBgAsset(null);
                setCustomBackground('');
            };

            const addPokemon = () => {
                if (!selectedPoke) return;

                const name = String(selectedPoke.names.English);
                const baseId = selectedPoke.dex;
                const paddedId = String(baseId).padStart(3, '0');
                
                // --- SPRITE RESOLUTION ---
                // GitHub Archive Logic (Authentic GO storage style)
                let goFormId = "00";
                if (name.includes("Origin")) goFormId = "61";
                else if (name.includes("Alolan")) goFormId = "12";
                else if (name.includes("Galarian")) goFormId = "31";
                else if (name.includes("Hisuian")) goFormId = "51";

                const githubUrl = `https://raw.githubusercontent.com/RetroJohn86/Pokemon-Go-Assets-Archive-Sprites/main/Sprites/pokemon_icon_${paddedId}_${goFormId}${isShiny ? '_shiny' : ''}.png`;

                // Logic for primary image:
                // 1. costume selection image from API
                // 2. background selection image from API
                // 3. github archive (base forms)
                let finalImg = githubUrl;
                if (selectedCostume) {
                    finalImg = isShiny ? (selectedCostume.shinyImage || selectedCostume.image) : selectedCostume.image;
                } else if (selectedBgAsset) {
                    finalImg = isShiny ? (selectedBgAsset.shinyImage || selectedBgAsset.image) : selectedBgAsset.image;
                }

                // Ultimate Fallback: Home 3D Sprite
                const spriteType = isShiny ? 'shiny' : 'normal';
                let homeName = name.toLowerCase().replace(/ /g, "-").replace(/[()]/g, "");
                if (name.includes("Unown")) homeName = `unown-${unownLetter}`;
                const homeSpriteUrl = `https://img.pokemondb.net/sprites/home/${spriteType}/${homeName}.png`;

                const entry = {
                    id: Date.now(),
                    name: name + (name.includes("Unown") ? ` (${unownLetter.toUpperCase()})` : ""),
                    isShiny, isLucky, formState,
                    costumeName: selectedCostume ? String(selectedCostume.displayName) : "",
                    backgroundName: selectedBgAsset ? String(selectedBgAsset.displayName) : String(customBackground),
                    imgUrl: finalImg,
                    githubUrl,
                    homeUrl: homeSpriteUrl,
                    bgUrl: (selectedBgAsset || customBackground) ? `https://www.serebii.net/pokemongo/locationcard/th/${BG_IMAGE_MAP[name.toLowerCase().replace(/ /g,"-")] || 'standard'}.jpg` : null
                };

                if (activeSection === 'wanted') setWantedList(prev => [...prev, entry]);
                else setOfferedList(prev => [...prev, entry]);

                // Reset config
                setSearchTerm(''); setSelectedPoke(null); setSelectedCostume(null); setSelectedBgAsset(null); setCustomBackground(''); setFormState('normal'); setIsShiny(false); setIsLucky(false);
            };

            const PokemonCard = ({ item, onRemove }) => {
                const handleImgError = (e) => {
                    if (e.target.src !== item.homeUrl) e.target.src = item.homeUrl;
                    else e.target.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png";
                };
                return (
                    <div className={`relative group flex flex-col items-center p-4 border-2 transition-all hover:border-white cursor-pointer min-h-[240px] overflow-hidden ${item.isLucky ? 'bg-orange-500/10 border-orange-500/50 shadow-[0_0_15px_rgba(249,115,22,0.2)]' : 'bg-zinc-800 border-zinc-700'}`} onClick={onRemove}>
                        {item.bgUrl && (
                            <div className="absolute inset-0 z-0">
                                <img src={item.bgUrl} crossOrigin="anonymous" className="w-full h-full object-cover opacity-60 brightness-75 scale-110" alt="" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                            </div>
                        )}
                        <div className="absolute top-2 right-2 flex flex-col gap-1.5 z-20">
                            {item.isShiny && <Icon name="sparkles" className="w-5 h-5 text-yellow-400" />}
                            {item.isLucky && <Icon name="zap" className="w-5 h-5 text-orange-400" />}
                            {item.formState === 'mega' && <Icon name="activity" className="w-5 h-5 text-indigo-400" />}
                        </div>
                        <div className="absolute top-2 left-2 flex flex-col gap-1.5 z-20">
                            {item.backgroundName && <Icon name="image" className="w-4 h-4 text-emerald-400" />}
                            {item.costumeName && <Icon name="shirt" className="w-4 h-4 text-blue-400" />}
                        </div>
                        <div className="relative mb-3 z-10">
                            <img src={item.imgUrl} crossOrigin="anonymous" className={`w-28 h-28 object-contain drop-shadow-2xl ${item.formState !== 'normal' ? 'scale-110' : ''}`} onError={handleImgError} />
                        </div>
                        <p className="text-[13px] font-black text-center w-full text-white uppercase tracking-tighter px-0.5 leading-none mb-2 z-10">{String(item.name)}</p>
                        <div className="flex flex-col gap-1 w-full items-center mt-auto z-10">
                            {item.formState !== 'normal' && <div className={`text-[8px] font-black px-2 py-0.5 w-full text-center uppercase ${item.formState === 'mega' ? 'bg-indigo-600' : 'bg-pink-600'}`}>{String(item.formState)}</div>}
                            {item.costumeName && <div className="bg-blue-600/90 text-white text-[9px] font-black px-2 py-1.5 w-full text-center uppercase leading-tight border-l-2 border-white/30 whitespace-pre-wrap">{String(item.costumeName)}</div>}
                            {item.backgroundName && <div className="bg-emerald-600/90 text-white text-[9px] font-black px-2 py-1.5 w-full text-center uppercase leading-tight border-l-2 border-white/30 whitespace-pre-wrap">{String(item.backgroundName)}</div>}
                        </div>
                        <div className="absolute inset-0 bg-red-600/90 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-30"><Icon name="trash" className="text-white w-10 h-10" /></div>
                    </div>
                );
            };

            const canBeShiny = useMemo(() => {
                if (!selectedPoke) return false;
                if (selectedCostume) return !!selectedCostume.shinyImage;
                if (selectedBgAsset) return !!selectedBgAsset.shinyImage;
                return !!(selectedPoke.shinyAvailable || selectedPoke.shinyImage);
            }, [selectedPoke, selectedCostume, selectedBgAsset]);

            return (
                <div className="min-h-screen text-zinc-100 pb-12">
                    <div className="bg-zinc-900 border-b-4 border-blue-500 px-6 py-4 sticky top-0 z-40 flex items-center justify-between shadow-2xl">
                        <div className="flex items-center gap-2"><Icon name="star" className="w-6 h-6 text-blue-500" /><h1 className="text-2xl font-black tracking-tighter uppercase italic text-zinc-100">Go Trade Board</h1></div>
                        <button onClick={handleExport} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-6 py-2 text-sm font-black uppercase shadow-lg active:translate-y-0.5 transition-all"><Icon name="download" className="w-4 h-4" /> <span>Save Board</span></button>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-zinc-900 p-6 border-l-4 border-blue-500 shadow-xl space-y-8">
                                
                                {/* Step 1: List Type */}
                                <div className="space-y-2 z-[60] relative">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block italic tracking-tighter">Step 1. Target List</label>
                                    <div className="grid grid-cols-2 gap-2 p-1 bg-zinc-950 border border-zinc-800">
                                        <button onClick={() => setActiveSection('wanted')} className={`py-3 text-[10px] font-black transition-all ${activeSection === 'wanted' ? 'bg-red-600 text-white' : 'text-zinc-600 hover:text-zinc-300'}`}>LOOKING FOR</button>
                                        <button onClick={() => setActiveSection('offered')} className={`py-3 text-[10px] font-black transition-all ${activeSection === 'offered' ? 'bg-emerald-600 text-white' : 'text-zinc-600 hover:text-zinc-300'}`}>FOR TRADE</button>
                                    </div>
                                </div>

                                {/* Step 2: Search */}
                                <div className="space-y-2 relative z-[50]">
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block italic tracking-tighter">Step 2. Select Pokémon</label>
                                    <div className="relative">
                                        <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                        <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-sm font-bold uppercase transition-all" placeholder="Enter species name..." />
                                        {selectedPoke && <Icon name="check" className="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-500 w-5 h-5" />}
                                    </div>
                                    {suggestions.length > 0 && (
                                        <div className="absolute z-[100] w-full mt-1 bg-zinc-800 border-2 border-zinc-700 shadow-2xl max-h-60 overflow-y-auto custom-scrollbar">
                                            {suggestions.map(s => <button key={s.id} onClick={() => selectPokemon(s)} className="w-full text-left px-4 py-3 hover:bg-zinc-700 text-sm border-b border-zinc-700 font-black uppercase flex items-center justify-between transition-colors"><span className="text-zinc-100">{String(s.names?.English || "Unknown")}</span><Icon name="right" className="w-4 h-4 text-zinc-500" /></button>)}
                                        </div>
                                    )}
                                </div>

                                {/* Step 3: Game Asset */}
                                <div className={`space-y-2 relative z-[40] transition-all ${selectedPoke ? 'step-active' : 'step-inactive'}`}>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block italic tracking-tighter">Step 3. Check Game Asset (Costume/Event)</label>
                                    <div className="relative">
                                        <Icon name="package" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                        <input readOnly type="text" value={String(selectedCostume ? selectedCostume.displayName : "No Costume Detected")} onClick={() => setShowCostumeList(!showCostumeList)} className="w-full pl-10 pr-10 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer transition-colors" />
                                        <Icon name="down" className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500" />
                                    </div>
                                    {showCostumeList && (
                                        <div className="absolute z-[100] w-full mt-1 bg-zinc-950 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                            {assetGroups.costumes.map(asset => (
                                                <button key={asset.id} onClick={() => { setSelectedCostume(asset); setShowCostumeList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] border-b border-zinc-800 font-black uppercase text-zinc-400 hover:text-zinc-100 flex items-center gap-3 transition-colors">
                                                    <img src={asset.image} className="w-8 h-8 object-contain" crossOrigin="anonymous" />
                                                    {String(asset.displayName)}
                                                </button>
                                            ))}
                                            <button onClick={() => { setSelectedCostume(null); setShowCostumeList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] font-black uppercase text-zinc-600 italic">No Costume / Standard</button>
                                        </div>
                                    )}
                                </div>

                                {/* Step 4: Background */}
                                <div className={`space-y-2 relative z-[30] transition-all ${selectedPoke ? 'step-active' : 'step-inactive'}`}>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block italic tracking-tighter">Step 4. Special Background</label>
                                    <div className="relative">
                                        <Icon name="image" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                                        <input readOnly type="text" value={String(selectedBgAsset ? selectedBgAsset.displayName : customBackground || "Check for special BG...")} onClick={() => setShowBgList(!showBgList)} className="w-full pl-10 pr-10 py-4 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer" />
                                        <Icon name="down" className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500" />
                                    </div>
                                    {showBgList && (
                                        <div className="absolute z-[100] w-full mt-1 bg-zinc-950 border-2 border-zinc-700 shadow-2xl max-h-48 overflow-y-auto custom-scrollbar">
                                            {assetGroups.backgrounds.map(asset => (
                                                <button key={asset.id} onClick={() => { setSelectedBgAsset(asset); setCustomBackground(''); setShowBgList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] border-b border-zinc-800 font-black uppercase text-zinc-400 hover:text-zinc-100 flex items-center gap-3">
                                                    <img src={asset.image} className="w-8 h-8 object-contain" crossOrigin="anonymous" />
                                                    {String(asset.displayName)}
                                                </button>
                                            ))}
                                            <button onClick={() => { setSelectedBgAsset(null); setShowBgList(false); }} className="w-full text-left px-4 py-2 hover:bg-zinc-800 text-[10px] font-black uppercase text-zinc-600 italic">Reset Background</button>
                                        </div>
                                    )}
                                    <input type="text" value={customBackground} onChange={(e) => { setCustomBackground(e.target.value); setSelectedBgAsset(null); }} className="w-full px-4 py-2 bg-zinc-950 border border-zinc-800 outline-none focus:border-blue-500 text-[10px] font-bold uppercase mt-1" placeholder="Manual BG Note..." />
                                </div>

                                {/* Step 5: Shiny / Extra */}
                                <div className={`space-y-6 pt-4 border-t border-zinc-800 z-[20] relative transition-all ${selectedPoke ? 'step-active' : 'step-inactive'}`}>
                                    <label className="text-[10px] font-black text-blue-500 uppercase tracking-widest block italic tracking-tighter">Step 5. Finishing Touches</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {canBeShiny && (
                                            <button onClick={() => setIsShiny(!isShiny)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isShiny ? 'bg-yellow-500/10 border-yellow-500 text-yellow-500' : 'bg-zinc-800 border-zinc-700 text-zinc-600'}`}>
                                                <Icon name="sparkles" /> <span className="text-[10px] font-black uppercase">Shiny</span>
                                            </button>
                                        )}
                                        <button onClick={() => setIsLucky(!isLucky)} className={`flex items-center justify-center gap-2 py-3 border-2 transition-all ${isLucky ? 'bg-orange-500/10 border-orange-500 text-orange-500 shadow-[inset_0_0_10px_rgba(249,115,22,0.2)]' : 'bg-zinc-800 border-zinc-700 text-zinc-600'}`}>
                                            <Icon name="zap" /> <span className="text-[10px] font-black uppercase">Lucky</span>
                                        </button>
                                    </div>

                                    {(selectedPoke?.tempEvolutions?.length > 0 || selectedPoke?.dex <= 1000) && (
                                        <select value={formState} onChange={(e) => setFormState(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 outline-none focus:border-blue-500 text-xs font-bold uppercase cursor-pointer" >
                                            <option value="normal">Standard Form</option>
                                            {selectedPoke?.dex <= 1000 && <option value="dynamax">Dynamax</option>}
                                            {selectedPoke?.dex <= 1000 && <option value="gigantamax">Gigantamax</option>}
                                            {selectedPoke?.tempEvolutions?.length > 0 && <option value="mega">Mega Evolution</option>}
                                        </select>
                                    )}

                                    <button onClick={addPokemon} className="w-full py-5 font-black bg-white text-black hover:bg-blue-600 hover:text-white transition-all uppercase tracking-widest flex items-center justify-center gap-2 shadow-2xl">
                                        <Icon name="star" className="w-6 h-6 mb-0.5" /> ADD TO BOARD
                                    </button>
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-8">
                            <div className="overflow-x-auto pb-8">
                                <div ref={exportRef} id="export-board" className="bg-zinc-950 p-10 border-[20px] border-zinc-900 flex flex-col gap-12 mx-auto">
                                    <div className="flex flex-col items-center">
                                        <h2 className="text-7xl font-black text-white tracking-tighter uppercase italic leading-none border-b-[12px] border-blue-600 pb-3 text-center tracking-tighter">TRADE LIST</h2>
                                    </div>
                                    <div className="space-y-5">
                                        <div className="flex items-center gap-4 bg-red-600 px-6 py-3 shadow-xl">
                                            <Icon name="search" className="w-8 h-8 text-white" />
                                            <h3 className="text-3xl font-black text-white uppercase italic tracking-widest">WANTED</h3>
                                        </div>
                                        <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800">
                                            {wantedList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => setWantedList(prev => prev.filter(p => p.id !== item.id))} />)}
                                            {wantedList.length === 0 && <div className="col-span-full h-40 flex items-center justify-center text-zinc-800 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900 bg-zinc-950">EMPTY</div>}
                                        </div>
                                    </div>
                                    <div className="space-y-5 flex-1">
                                        <div className="flex items-center gap-4 bg-emerald-600 px-6 py-3 shadow-xl">
                                            <Icon name="zap" className="w-8 h-8 text-white" />
                                            <h3 className="text-3xl font-black text-white uppercase italic tracking-widest">FOR TRADE</h3>
                                        </div>
                                        <div className="grid grid-cols-4 gap-4 bg-zinc-900/50 p-4 border-2 border-zinc-800">
                                            {offeredList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => setOfferedList(prev => prev.filter(p => p.id !== item.id))} />)}
                                            {offeredList.length === 0 && <div className="col-span-full h-40 flex items-center justify-center text-zinc-800 font-black uppercase text-xl tracking-[0.5em] border-4 border-dashed border-zinc-900 bg-zinc-950">EMPTY</div>}
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between pt-10 border-t-4 border-zinc-900">
                                        <div className="flex gap-2 opacity-20">
                                            {[...Array(6)].map((_, i) => <div key={i} className="w-8 h-1 bg-white"></div>)}
                                        </div>
                                        <p className="text-zinc-700 text-xs font-black uppercase tracking-[0.5em] italic">MODULAR_FLOW_V35.0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
