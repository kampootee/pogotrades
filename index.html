<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoGo Trade Board</title>
    <style>
        :root {
            --primary: #3b4cca;
            --secondary: #ffde00;
            --bg: #f4f4f9;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        main { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* Left Panel: Input */
        .controls { width: 350px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        select, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 1rem; }
        .hidden { display: none !important; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-have { background: #4caf50; color: white; flex: 1; cursor: pointer; border: none; }
        .btn-need { background: #f44336; color: white; flex: 1; cursor: pointer; border: none; }

        /* Right Panel: Display */
        .display-area { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .board-section { background: rgba(255,255,255,0.5); border-radius: 12px; padding: 15px; min-height: 200px; border: 2px dashed #ccc; }
        .board-section h2 { margin-top: 0; color: #555; font-size: 1.2rem; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }

        /* Pokemon Card */
        .poke-card { background: white; border-radius: 8px; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; border: 1px solid #eee; }
        .poke-card img { width: 80px; height: 80px; object-fit: contain; }
        .poke-card .name { font-weight: bold; font-size: 0.9rem; display: block; }
        .poke-card .sub-text { font-size: 0.7rem; color: #777; line-height: 1.2; }
        .shiny-icon { position: absolute; top: 5px; right: 5px; width: 20px !important; height: 20px !important; }
        
        /* Special Backgrounds */
        .bg-location { background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); }
        .bg-special { background: linear-gradient(to top, #a18cd1 0%, #fbc2eb 100%); }
    </style>
</head>
<body>

<header>
    <h1>Pokémon GO Trade Board</h1>
</header>

<main>
    <div class="controls">
        <label>Select Pokémon</label>
        <select id="pokeSelect">
            <option value="">Loading...</option>
        </select>

        <div id="formContainer" class="hidden">
            <label>Form / Mega</label>
            <select id="formSelect"></select>
        </div>

        <div id="shinyContainer" class="hidden">
            <label><input type="checkbox" id="shinyCheck"> Shiny Available</label>
        </div>

        <div>
            <label>Costume / Event</label>
            <select id="costumeSelect">
                <option value="none">None</option>
                <option value="party-hat">Party Hat</option>
                <option value="santa-hat">Santa Hat</option>
                <option value="bow">New Year Bow</option>
            </select>
        </div>

        <div>
            <label>Background</label>
            <select id="bgSelect">
                <option value="none">Standard</option>
                <option value="location">Location Background</option>
                <option value="special">Special Background</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn-have" onclick="addToBoard('have')">Add to HAVE</button>
            <button class="btn-need" onclick="addToBoard('need')">Add to NEED</button>
        </div>
    </div>

    <div class="display-area">
        <div class="board-section">
            <h2>Looking For (Need)</h2>
            <div id="needGrid" class="grid"></div>
        </div>
        <div class="board-section">
            <h2>For Trade (Have)</h2>
            <div id="haveGrid" class="grid"></div>
        </div>
    </div>
</main>

<script>
    const API_URL = 'https://pokemon-go-api.github.io/pokemon-go-api/api/pokedex.json';
    let pokemonData = [];
    let currentSelection = null;

    // Elements
    const pokeSelect = document.getElementById('pokeSelect');
    const formContainer = document.getElementById('formContainer');
    const formSelect = document.getElementById('formSelect');
    const shinyContainer = document.getElementById('shinyContainer');
    const shinyCheck = document.getElementById('shinyCheck');

    // Init: Load Data
    async function init() {
        try {
            const response = await fetch(API_URL);
            pokemonData = await response.json();
            
            pokeSelect.innerHTML = '<option value="">Select a Pokemon</option>';
            pokemonData.forEach((p, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = `#${p.dexNr} ${p.names.English}`;
                pokeSelect.appendChild(opt);
            });
        } catch (e) {
            console.error("Failed to load Pokemon data", e);
        }
    }

    // Logic: Update available options based on Pokemon selection
    pokeSelect.addEventListener('change', (e) => {
        const p = pokemonData[e.target.value];
        currentSelection = p;
        
        if (!p) {
            formContainer.classList.add('hidden');
            shinyContainer.classList.add('hidden');
            return;
        }

        // Handle Shiny
        // The API usually provides assets for shiny if available
        if (p.shinyReleased || (p.assets && p.assets.shinyImage)) {
            shinyContainer.classList.remove('hidden');
        } else {
            shinyContainer.classList.add('hidden');
            shinyCheck.checked = false;
        }

        // Handle Forms (Mega, Alolan, etc)
        formSelect.innerHTML = '<option value="normal">Normal</option>';
        let hasForms = false;

        // Check for Megas in the data
        // Note: Some APIs nest megas, others list them as separate entries.
        // This logic adapts to common JSON structures.
        if (p.megaEvolutions) {
            Object.keys(p.megaEvolutions).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key.replace('MEGA_', 'Mega ');
                formSelect.appendChild(opt);
                hasForms = true;
            });
        }
        
        if (hasForms) formContainer.classList.remove('hidden');
        else formContainer.classList.add('hidden');
    });

    // UI: Add card to board
    function addToBoard(type) {
        if (!currentSelection) return alert("Select a Pokemon first!");

        const isShiny = shinyCheck.checked;
        const form = formSelect.value;
        const costume = document.getElementById('costumeSelect').value;
        const bg = document.getElementById('bgSelect').value;

        // Create Card Element
        const card = document.createElement('div');
        card.className = `poke-card bg-${bg}`;
        
        // Determine Image (API fallback logic)
        let imgUrl = isShiny ? currentSelection.assets?.shinyImage : currentSelection.assets?.image;
        if (!imgUrl) imgUrl = `https://raw.githubusercontent.com/PokeMiners/pogo_assets/master/Images/Pokemon/Addressable%20Assets/pm${currentSelection.dexNr}.icon.png`;

        card.innerHTML = `
            ${isShiny ? '<img src="https://raw.githubusercontent.com/Fortnite-API/gallery/master/icons/shiny.png" class="shiny-icon">' : ''}
            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
            <span class="name">${currentSelection.names.English}</span>
            <div class="sub-text">
                ${form !== 'normal' ? `<div>${form}</div>` : ''}
                ${costume !== 'none' ? `<div>${costume}</div>` : ''}
                ${bg !== 'none' ? `<div>${bg} BG</div>` : ''}
            </div>
            <button style="font-size:10px; margin-top:5px; cursor:pointer;" onclick="this.parentElement.remove()">Remove</button>
        `;

        const targetGrid = type === 'have' ? document.getElementById('haveGrid') : document.getElementById('needGrid');
        targetGrid.appendChild(card);
    }

    init();
</script>

</body>
</html>
