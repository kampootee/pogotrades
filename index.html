<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoGo Trade Board - Sleek Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat SDKs (Required for standalone HTML without a build step) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .print\:hidden { display: none !important; }
            aside { display: none !important; }
            main { padding: 0 !important; width: 100% !important; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Inline SVG Icons to replace Lucide library and fix forwardRef errors
        const Icon = ({ name, className = "w-5 h-5", fill = "none" }) => {
            const icons = {
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Sparkles: <path d="m12 3 1.912 5.886L20 10.8l-5.886 1.912L12 18.6l-1.912-5.888L4.2 10.8l5.886-1.914L12 3Zm-7 12 1.366 4.134L10.5 20.5l-4.134 1.366L5 26l-1.366-4.134L-0.5 20.5l4.134-1.366L5 15Zm14 0 1.366 4.134L24.5 20.5l-4.134 1.366L19 26l-1.366-4.134L13.5 20.5l4.134-1.366L19 15Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill={fill}/>,
                MapPin: <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0ZM12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill={fill}/>,
                Star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill={fill}/>,
                Plus: <path d="M12 5v14m-7-7h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Info: <path d="M12 16v-4m0-4h.01M22 12A10 10 0 1 1 2 12a10 10 0 0 1 20 0Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Search: <path d="M21 21l-4.35-4.35M19 11A8 8 0 1 1 3 11a8 8 0 0 1 16 0Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                X: <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                ChevronDown: <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Copy: <path d="M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2ZM5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Check: <path d="M20 6L9 17l-5-5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Share2: <path d="M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-12 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm12 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-9.3-11.7l6.6-3.6m-6.6 9.6l6.6 3.6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Loader2: <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin origin-center"/>
            };
            return (
                <svg viewBox="0 0 24 24" fill={fill} className={className} xmlns="http://www.w3.org/2000/svg">
                    {icons[name] || null}
                </svg>
            );
        };

        // Configuration and Initialization
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Note: If running locally outside this environment, paste your Firebase config object here.
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const API_URL = 'https://pokemon-go-api.github.io/pokemon-go-api/api/pokedex.json';

        // Firebase Initialization using Compat mode
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const PokemonCard = ({ item, onRemove }) => {
            const getBgClass = () => {
                switch(item.bg) {
                    case 'Location': return 'bg-gradient-to-br from-orange-100 via-rose-50 to-amber-50 border-orange-200';
                    case 'Special': return 'bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-50 border-indigo-200';
                    default: return 'bg-white border-slate-200';
                }
            };

            return (
                <div className={`relative group p-5 rounded-[2.5rem] shadow-md border transition-all hover:scale-105 hover:shadow-xl hover:z-10 ${getBgClass()}`}>
                    {item.isShiny && (
                        <div className="absolute top-4 right-4 z-10 bg-white/80 backdrop-blur-md p-1.5 rounded-2xl border border-amber-200 shadow-sm">
                            <Icon name="Sparkles" className="w-5 h-5 text-amber-500" fill="currentColor" />
                        </div>
                    )}
                    {item.bg === 'Location' && (
                        <div className="absolute top-4 left-4 z-10 bg-rose-100/80 backdrop-blur-md p-1.5 rounded-2xl border border-rose-200 shadow-sm">
                            <Icon name="MapPin" className="w-4 h-4 text-rose-600" />
                        </div>
                    )}

                    <div className="relative aspect-square mb-2 flex items-center justify-center p-2">
                        <img 
                            src={item.image} 
                            alt={item.name} 
                            className={`w-full h-full object-contain ${item.isShiny ? 'drop-shadow-lg' : 'drop-shadow-md'}`} 
                            loading="lazy" 
                            onError={(e) => e.target.src = `https://raw.githubusercontent.com/PokeMiners/pogo_assets/master/Images/Pokemon/Addressable%20Assets/pm${item.dexNr}.icon.png`} 
                        />
                    </div>

                    <div className="text-center">
                        <span className="text-[9px] font-black text-slate-500 bg-slate-50 px-3 py-1 rounded-full uppercase italic tracking-[0.2em] border border-slate-200 shadow-inner leading-none inline-block">#{item.dexNr}</span>
                    </div>

                    <button onClick={onRemove} className="absolute -top-3 -right-3 bg-slate-800 text-white p-2.5 rounded-2xl opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-rose-600 active:scale-75 z-20 print:hidden flex items-center justify-center transform group-hover:rotate-6">
                        <Icon name="Trash2" className="w-5 h-5" />
                    </button>
                </div>
            );
        };

        const App = () => {
            const [pokedex, setPokedex] = useState([]);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [shareUrl, setShareUrl] = useState("");

            const [searchTerm, setSearchTerm] = useState("");
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [selectedDexIndex, setSelectedDexIndex] = useState("");
            const dropdownRef = useRef(null);

            const [isShiny, setIsShiny] = useState(false);
            const [selectedVariantId, setSelectedVariantId] = useState("standard");
            const [selectedBg, setSelectedBg] = useState("Standard");

            const [haveList, setHaveList] = useState([]);
            const [needList, setNeedList] = useState([]);
            const [copiedType, setCopiedType] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (initialToken) {
                            await auth.signInWithCustomToken(initialToken);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { console.error("Auth failed", err); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(API_URL);
                        const data = await response.json();
                        setPokedex(data);

                        const params = new URLSearchParams(window.location.search);
                        const boardId = params.get('board');
                        
                        if (boardId) {
                            const boardRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('boards').doc(boardId);
                            const boardSnap = await boardRef.get();
                            if (boardSnap.exists()) {
                                const boardData = boardSnap.data();
                                setHaveList(boardData.haveList || []);
                                setNeedList(boardData.needList || []);
                            }
                        }
                        setLoading(false);
                    } catch (err) { console.error("Fetch failed", err); setLoading(false); }
                };
                fetchData();
            }, []);

            const formatApiLabel = (text) => {
                if (!text || text === "Normal" || text === "None") return "";
                return text.replace(/COSTUME_/g, '').split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
            };

            const suggestions = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const lowerTerm = searchTerm.toLowerCase();
                return pokedex
                    .map((p, idx) => ({ ...p, originalIndex: idx }))
                    .filter(p => {
                        const name = p.names?.English || "";
                        return name.toLowerCase().includes(lowerTerm) || p.dexNr.toString().includes(lowerTerm);
                    })
                    .slice(0, 10);
            }, [searchTerm, pokedex]);

            const currentPokemon = useMemo(() => {
                if (selectedDexIndex === "") return null;
                return pokedex[selectedDexIndex];
            }, [selectedDexIndex, pokedex]);

            const variantOptions = useMemo(() => {
                if (!currentPokemon) return [];
                const options = [{ id: 'standard', label: 'Standard', form: 'Normal', costume: 'None' }];
                if (currentPokemon.megaEvolutions) {
                    Object.keys(currentPokemon.megaEvolutions).forEach(key => options.push({ id: `mega-${key}`, label: formatApiLabel(key), form: key, costume: 'None' }));
                }
                if (currentPokemon.assetForms) {
                    currentPokemon.assetForms.forEach((af, index) => {
                        const combined = [formatApiLabel(af.form), formatApiLabel(af.costume)].filter(Boolean).join(' ');
                        if (combined) options.push({ id: `asset-${index}`, label: combined, form: af.form || 'Normal', costume: af.costume || 'None', apiImages: { image: af.image, shinyImage: af.shinyImage } });
                    });
                }
                return options;
            }, [currentPokemon]);

            const activeVariant = useMemo(() => variantOptions.find(v => v.id === selectedVariantId) || variantOptions[0], [selectedVariantId, variantOptions]);

            const getPokemonImage = (pokemon, variant, shiny) => {
                if (!pokemon || !variant) return "";
                if (variant.apiImages) {
                    const img = shiny ? (variant.apiImages.shinyImage || variant.apiImages.image) : variant.apiImages.image;
                    if (img) return img;
                }
                if (variant.form.startsWith("MEGA_") && pokemon.megaEvolutions?.[variant.form]?.assets) {
                    const megaAssets = pokemon.megaEvolutions[variant.form].assets;
                    const img = shiny ? (megaAssets.shinyImage || megaAssets.image) : megaAssets.image;
                    if (img) return img;
                }
                return pokemon.assets ? (shiny ? (pokemon.assets.shinyImage || pokemon.assets.image) : pokemon.assets.image) : `https://raw.githubusercontent.com/PokeMiners/pogo_assets/master/Images/Pokemon/Addressable%20Assets/pm${pokemon.dexNr}.icon.png`;
            };

            const addPokemon = (type) => {
                if (!currentPokemon || !activeVariant) return;
                const newItem = {
                    id: crypto.randomUUID(),
                    dexNr: currentPokemon.dexNr,
                    name: currentPokemon.names.English,
                    isShiny: isShiny,
                    variantLabel: activeVariant.label,
                    form: activeVariant.form,
                    costume: activeVariant.costume,
                    bg: selectedBg,
                    image: getPokemonImage(currentPokemon, activeVariant, isShiny)
                };
                if (type === 'have') setHaveList([...haveList, newItem]);
                else setNeedList([...needList, newItem]);
            };

            const clearSearch = () => {
                setSearchTerm("");
                setSelectedDexIndex("");
                setIsDropdownOpen(false);
            };

            const selectPokemon = (index, name) => {
                setSelectedDexIndex(index);
                setSearchTerm(name);
                setIsDropdownOpen(false);
            };

            const generateSearchString = (list) => {
                if (list.length === 0) return "";
                const uniqueDEX = [...new Set(list.map(item => item.dexNr.toString().padStart(4, '0')))];
                let str = uniqueDEX.join(',');
                if (list.some(item => item.costume !== "None")) str += "&costume";
                if (list.some(item => item.isShiny)) str += "&shiny";
                return str;
            };

            const removeItem = (id, type) => {
                if (type === 'have') setHaveList(prev => prev.filter(item => item.id !== id));
                else setNeedList(prev => prev.filter(item => item.id !== id));
            };

            const saveAndShareBoard = async () => {
                if (!user) return;
                setIsSaving(true);
                const boardId = crypto.randomUUID().split('-')[0];
                const boardRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('boards').doc(boardId);
                try {
                    await boardRef.set({ haveList, needList, createdAt: Date.now() });
                    const url = `${window.location.origin}${window.location.pathname}?board=${boardId}`;
                    setShareUrl(url);
                    const el = document.createElement('textarea');
                    el.value = url;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                } catch (err) { console.error("Save failed", err); }
                finally { setIsSaving(false); }
            };

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            if (loading) return (
                <div className="flex items-center justify-center h-screen bg-slate-50 text-slate-800 font-black italic uppercase tracking-widest text-center">
                    <div className="flex flex-col items-center gap-4">
                        <Icon name="Loader2" className="w-12 h-12 text-blue-600" />
                        <span className="animate-pulse">Loading Assets...</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-100 text-slate-900 flex flex-col md:flex-row antialiased">
                    <aside className="w-full md:w-80 bg-white border-r border-slate-200 p-6 flex flex-col gap-6 shadow-xl z-20 overflow-y-auto max-h-screen">
                        <div className="space-y-2 relative" ref={dropdownRef}>
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Pokedex Search</label>
                            <div className="relative group">
                                <input 
                                    type="text"
                                    placeholder="Pokemon name..."
                                    className="w-full pl-10 pr-10 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold placeholder:text-slate-400 text-slate-800"
                                    value={searchTerm}
                                    onChange={(e) => { setSearchTerm(e.target.value); setIsDropdownOpen(true); }}
                                    onFocus={() => setIsDropdownOpen(true)}
                                />
                                <Icon name="Search" className="absolute left-3.5 top-3.5 text-slate-400 group-focus-within:text-blue-500 transition-colors w-5 h-5" />
                                {searchTerm && <button onClick={clearSearch} className="absolute right-3.5 top-3.5 text-slate-400 hover:text-slate-600"><Icon name="X" className="w-5 h-5" /></button>}
                            </div>
                            
                            {isDropdownOpen && suggestions.length > 0 && (
                                <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-50 overflow-hidden max-h-72 overflow-y-auto">
                                    {suggestions.map((p) => (
                                        <button key={p.originalIndex} className="w-full flex items-center gap-4 p-3 hover:bg-slate-50 border-b border-slate-100 last:border-0 text-left transition-colors" onClick={() => selectPokemon(p.originalIndex, p.names.English)}>
                                            <img src={p.assets?.image || `https://raw.githubusercontent.com/PokeMiners/pogo_assets/master/Images/Pokemon/Addressable%20Assets/pm${p.dexNr}.icon.png`} className="w-10 h-10 object-contain" alt="" />
                                            <div>
                                                <div className="text-sm font-black text-slate-800 uppercase italic tracking-tighter leading-none">{String(p.names?.English || "")}</div>
                                                <div className="text-[10px] text-slate-400 font-black tracking-widest mt-0.5">#{p.dexNr}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {currentPokemon && (
                            <div className="space-y-5 animate-in fade-in slide-in-from-top-4 duration-500">
                                <div className="relative group p-6 bg-slate-50 rounded-3xl border border-slate-200 shadow-sm overflow-hidden text-center">
                                    <img src={getPokemonImage(currentPokemon, activeVariant, isShiny)} className="mx-auto w-32 h-32 object-contain drop-shadow-xl" alt="Preview" />
                                    <h2 className="mt-3 font-black text-slate-900 text-xl uppercase italic leading-tight tracking-tighter">{String(currentPokemon.names?.English || "")}</h2>
                                    <p className="text-[9px] text-blue-600 font-black uppercase tracking-[0.2em] mt-2 bg-blue-100 px-3 py-1 rounded-full inline-block">{String(activeVariant?.label || "Standard")}</p>
                                </div>

                                <div className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-lg ${isShiny ? 'bg-amber-100 text-amber-600 shadow-sm' : 'bg-slate-200 text-slate-400'}`}>
                                            <Icon name="Sparkles" className="w-5 h-5" fill={isShiny ? "currentColor" : "none"} />
                                        </div>
                                        <span className="text-sm font-black uppercase italic text-slate-600 tracking-tighter">Shiny Version</span>
                                    </div>
                                    <input type="checkbox" checked={isShiny} onChange={(e) => setIsShiny(e.target.checked)} className="w-6 h-6 rounded-lg border-slate-300 text-blue-600 focus:ring-blue-500/50 cursor-pointer accent-blue-600" />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Variant Select</label>
                                    <div className="relative">
                                        <select className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none text-slate-700 font-black uppercase italic tracking-tighter text-sm cursor-pointer shadow-sm appearance-none" value={selectedVariantId} onChange={(e) => setSelectedVariantId(e.target.value)}>
                                            {variantOptions.map(v => <option key={v.id} value={v.id}>{String(v.label || "")}</option>)}
                                        </select>
                                        <Icon name="ChevronDown" className="absolute right-4 top-4 text-slate-400 pointer-events-none w-4 h-4" />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Background Card</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Standard', 'Location', 'Special'].map(bg => (
                                            <button key={bg} onClick={() => setSelectedBg(bg)} className={`text-[9px] py-3 rounded-2xl border font-black uppercase tracking-tighter transition-all ${selectedBg === bg ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-200 text-slate-400 hover:border-slate-300'}`}>
                                                {bg}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 pt-4">
                                    <button onClick={() => addPokemon('have')} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-3xl transition-all active:scale-95 uppercase tracking-tighter italic text-lg shadow-lg shadow-emerald-200">Add to Trade</button>
                                    <button onClick={() => addPokemon('need')} className="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-3xl transition-all active:scale-95 uppercase tracking-tighter italic text-lg shadow-lg shadow-rose-200">Add to Need</button>
                                </div>
                            </div>
                        )}
                    </aside>

                    <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-slate-100 relative">
                        <div className="absolute top-6 right-6 flex items-center gap-3 print:hidden">
                            <button 
                                onClick={saveAndShareBoard}
                                disabled={isSaving || (haveList.length === 0 && needList.length === 0)}
                                className="flex items-center gap-2 px-4 py-2 text-[10px] font-black uppercase tracking-[0.2em] text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-all shadow-lg disabled:opacity-50"
                            >
                                {isSaving ? <Icon name="Loader2" className="w-4 h-4" /> : (shareUrl ? <Icon name="Check" className="w-4 h-4" /> : <Icon name="Share2" className="w-4 h-4" />)}
                                {shareUrl ? "URL COPIED" : "CLOUD SAVE"}
                            </button>
                            <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 bg-white border border-slate-200 rounded-xl hover:text-slate-800 transition-all shadow-sm">
                                <Icon name="Download" className="w-4 h-4" /> PRINT
                            </button>
                        </div>

                        <div className="max-w-6xl mx-auto space-y-16 pt-8">
                            <section>
                                <div className="flex items-center gap-4 mb-8">
                                    <h2 className="text-3xl font-black text-rose-600 uppercase italic tracking-tighter flex items-center gap-3"><Icon name="Star" fill="currentColor" className="w-8 h-8" /> Looking For</h2>
                                    <div className="h-[2px] flex-1 bg-gradient-to-r from-rose-200 to-transparent"></div>
                                </div>
                                {needList.length === 0 ? <div className="h-24 border-2 border-dashed border-slate-300 rounded-[2rem] flex items-center justify-center text-slate-400 bg-white/50 font-black uppercase italic tracking-widest text-xs">No entries in wishlist</div> : (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                            {needList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => removeItem(item.id, 'need')} />)}
                                        </div>
                                        <div className="flex items-center gap-4 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm group print:hidden">
                                            <div className="flex-1 overflow-hidden">
                                                <p className="text-[10px] font-black text-rose-500 uppercase tracking-[0.3em] mb-2">Search String</p>
                                                <code className="text-[11px] font-mono text-slate-600 truncate block whitespace-nowrap bg-slate-50 p-3 rounded-xl border border-slate-100">{generateSearchString(needList)}</code>
                                            </div>
                                            <button onClick={() => { const el = document.createElement('textarea'); el.value = generateSearchString(needList); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); setCopiedType('need'); setTimeout(() => setCopiedType(null), 2000); }} className={`p-3 rounded-2xl transition-all flex items-center gap-2 ${copiedType === 'need' ? 'bg-rose-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                {copiedType === 'need' ? <Icon name="Check" className="w-5 h-5" /> : <Icon name="Copy" className="w-5 h-5" />}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </section>

                            <section>
                                <div className="flex items-center gap-4 mb-8">
                                    <h2 className="text-3xl font-black text-emerald-600 uppercase italic tracking-tighter flex items-center gap-3"><Icon name="Plus" className="w-8 h-8 stroke-[3]" /> For Trade</h2>
                                    <div className="h-[2px] flex-1 bg-gradient-to-r from-emerald-200 to-transparent"></div>
                                </div>
                                {haveList.length === 0 ? <div className="h-24 border-2 border-dashed border-slate-300 rounded-[2rem] flex items-center justify-center text-slate-400 bg-white/50 font-black uppercase italic tracking-widest text-xs">No trade offers currently</div> : (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                            {haveList.map(item => <PokemonCard key={item.id} item={item} onRemove={() => removeItem(item.id, 'have')} />)}
                                        </div>
                                        <div className="flex items-center gap-4 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm group print:hidden">
                                            <div className="flex-1 overflow-hidden">
                                                <p className="text-[10px] font-black text-emerald-600 uppercase tracking-[0.3em] mb-2">Search String</p>
                                                <code className="text-[11px] font-mono text-slate-600 truncate block whitespace-nowrap bg-slate-50 p-3 rounded-xl border border-slate-100">{generateSearchString(haveList)}</code>
                                            </div>
                                            <button onClick={() => { const el = document.createElement('textarea'); el.value = generateSearchString(haveList); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); setCopiedType('have'); setTimeout(() => setCopiedType(null), 2000); }} className={`p-3 rounded-2xl transition-all flex items-center gap-2 ${copiedType === 'have' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                {copiedType === 'have' ? <Icon name="Check" className="w-5 h-5" /> : <Icon name="Copy" className="w-5 h-5" />}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </section>

                            <footer className="pt-12 pb-8 flex flex-col items-center gap-2 opacity-40">
                                <p className="text-[9px] font-black uppercase tracking-[0.4em] text-slate-500 italic text-center">Sync Protocol v2.5 // Cloud Edition</p>
                                <p className="text-[8px] text-slate-400 uppercase font-bold tracking-widest leading-none text-center">Metadata sourced from PogoAPI Community</p>
                            </footer>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
